{% if has_token %}
<div class="field-help" style="margin-bottom:1rem">
  Bridge token is configured. To replace it, submit a new token below.
</div>
<div id="claim-status"
     hx-get="/api/modules/telegram-bridge/claim-status"
     hx-trigger="load"
     hx-target="#claim-status"
     hx-swap="outerHTML">
  Loading claim status&hellip;
</div>
{% endif %}
<div class="field">
  <label for="token-input">Bot Token</label>
  <input id="token-input" name="token" type="password"
         placeholder="110201543:AAHdqTcvCH1vGWJxfSeofSz^MXFggAndnqQ"
         class="input">
  <p class="field-help">Paste your bot token from @BotFather.</p>
</div>
<div class="field">
  <label for="locale-input">Assistant language</label>
  <select id="locale-input" name="locale" class="input">
    <option value="en" {% if (config and config.locale == 'en') or not (config and config.locale) %}selected{% endif %}>English</option>
    <option value="ru" {% if config and config.locale == 'ru' %}selected{% endif %}>Русский</option>
  </select>
  <p class="field-help">
    Your assistant will speak this language from the first message.
  </p>
</div>
<div id="status-toast"></div>
<button class="btn btn-success"
        hx-post="/api/modules/telegram-bridge/install"
        hx-include="[name='token'], [name='locale']"
        hx-ext="json-enc"
        hx-target="#status-toast"
        hx-swap="innerHTML">
  Install Bridge
</button>
