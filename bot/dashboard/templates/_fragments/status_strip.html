<div id="status-strip"
     class="stats"
     hx-get="/fragments/status"
     hx-trigger="every 5s"
     hx-swap="outerHTML">
  <div class="stat" role="status" aria-label="Bot {{ stats.status_label }}">
    <div class="stat-value">
      <span class="dot {{ stats.status_dot }}" aria-hidden="true"></span>
      {{ stats.status_label }}
    </div>
    <div class="stat-label">Bot status</div>
  </div>
  <div class="stat">
    <div class="stat-value">{{ stats.modules_installed }}</div>
    <div class="stat-label">Modules installed</div>
  </div>
  <div class="stat">
    <div class="stat-value">{{ stats.events_today }}</div>
    <div class="stat-label">Events today</div>
  </div>
</div>
