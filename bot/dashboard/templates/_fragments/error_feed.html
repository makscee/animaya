<div id="error-feed"
     hx-get="/fragments/errors"
     hx-trigger="every 5s"
     hx-swap="outerHTML"
     role="list"
     aria-live="polite">
  {% if events %}
    {% for ev in events %}
      <div class="activity-item" role="listitem">
        <span class="dot dot-red" aria-hidden="true"></span>
        <span class="event-source badge-red">{{ ev.source }}</span>
        <span class="event-msg">{{ ev.message }}</span>
        <span class="event-ts" title="{{ ev.ts }}">{{ ev.ts | relative_time }}</span>
      </div>
    {% endfor %}
  {% else %}
    <div class="field-help">
      <strong>No recent errors</strong>
    </div>
  {% endif %}
</div>
