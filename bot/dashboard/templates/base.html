<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Animaya{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
  {# HTMX pinned to 2.0.3. SRI integrity hash is a follow-up hardening step
     (see plan 05-03 SUMMARY: T-05-03-07). Keep `defer` so navigation works
     before script eval. #}
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="container">
    <h1>Animaya</h1>
    <nav>
      <a href="/" class="{{ 'active' if (nav_active|default('')) == 'home' else '' }}">Dashboard</a>
      <a href="/modules" class="{{ 'active' if (nav_active|default('')) == 'modules' else '' }}">Modules</a>
      <a href="/logout">Log out</a>
    </nav>
    <div id="status-toast"></div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
