services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    container_name: animaya-bot
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - bot-data:/data
    network_mode: host
    # Resource limits (sandbox hardening deferred to Phase 3)
    mem_limit: 2g
    cpus: 1.0
    pids_limit: 256

volumes:
  bot-data:
    driver: local
