services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    container_name: animaya-bot
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - bot-data:/data
    ports:
      - "8090:8090"
    # Sandbox restrictions
    read_only: true
    tmpfs:
      - /tmp:size=512M
      - /app/__pycache__:size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW  # needed for DNS resolution
    mem_limit: 2g
    cpus: 1.0
    pids_limit: 256

volumes:
  bot-data:
    driver: local
